<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صانع الكرومات - فيديوهات قرآنية عشوائية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@400;700&family=Roboto:wght@300;400&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #022c22 0%, #064e3b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .canvas-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #c5a059, #e2c28a);
            color: #022c22;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 15px;
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #c5a059;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid #c5a059;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        select, input[type="range"] {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            cursor: pointer;
        }
        
        select:disabled, input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        select option {
            background: #022c22;
            color: white;
        }
        
        label {
            display: block;
            font-size: 12px;
            color: #c5a059;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .divider {
            margin: 20px 0;
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(197, 160, 89, 0.5), transparent);
        }
        
        .hidden { display: none; }
        
        .status-text {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            color: #c5a059;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .button-group .btn-primary,
        .button-group .btn-secondary {
            margin-top: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="row">
            <div><label>القارئ</label><select id="reciterSelect"></select></div>
            <div><label>السورة</label><select id="surahSelect"></select></div>
        </div>
        
        <div class="row">
            <div><label>من الآية</label><select id="startAyah"></select></div>
            <div><label>إلى الآية</label><select id="endAyah"></select></div>
        </div>
        
        <hr class="divider">
        
        <div class="row">
            <div>
                <label>المقاسات</label>
                <select id="ratioSelect">
                    <option value="9/16" selected>تيك توك (9:16)</option>
                    <option value="16/9">يوتيوب (16:9)</option>
                    <option value="1/1">مربع (1:1)</option>
                </select>
            </div>
            <div>
                <label>حجم النص العربي</label>
                <select id="arabicFontSize"></select>
            </div>
        </div>
        
        <div class="row">
            <div>
                <label>تأثير الانتقال البصري</label>
                <select id="transitionEffect">
                    <option value="fade" selected>تلاشي متداخل (Crossfade)</option>
                    <option value="none">بدون تأثير</option>
                </select>
            </div>
            <div>
                <label>إظهار اسم السورة والقارئ</label>
                <select id="showSurahNameSelect">
                    <option value="yes" selected>نعم</option>
                    <option value="no">لا</option>
                </select>
            </div>
        </div>
        
        <hr class="divider">
        
        <div class="row">
            <div>
                <label>لغة الترجمة</label>
                <select id="translationLang">
                    <option value="">بدون ترجمة</option>
                    <option value="en.sahih">الإنجليزية - Sahih International</option>
                    <option value="fr.hamidullah">الفرنسية - Hamidullah</option>
                    <option value="es.cortes">الإسبانية - Cortes</option>
                    <option value="pt.elhayek">البرتغالية - Elhayek</option>
                    <option value="de.aburida">الألمانية - Abu Rida</option>
                    <option value="tr.diyanet">التركية - Diyanet</option>
                    <option value="ru.kuliev">الروسية - Kuliev</option>
                    <option value="it.piccardo">الإيطالية - Piccardo</option>
                    <option value="nl.keyzer">الهولندية - Keyzer</option>
                    <option value="ur.jalandhry">الأردية - Jalandhry</option>
                    <option value="id.bahasa">الإندونيسية - Bahasa</option>
                    <option value="bn.hoque">البنغالية - Hoque</option>
                    <option value="zh.jian">الصينية - Jian</option>
                    <option value="fa.makarem">الفارسية - Makarem</option>
                    <option value="so.abduh">الصومالية - Abduh</option>
                </select>
            </div>
            <div>
                <label>حجم الترجمة</label>
                <select id="transFontSize" disabled></select>
            </div>
        </div>
        
        <hr class="divider">
        
        <div>
            <label>تعتيم الخلفية <span id="opacityValue">60</span>%</label>
            <input type="range" id="opacitySlider" min="0" max="100" value="60">
        </div>
        
        <div class="button-group">
            <button id="generateBtn" class="btn-primary">
                <i class="fas fa-download"></i> توليد الكروما (تجهيز)
            </button>
            <button id="startRecordBtn" class="btn-secondary" disabled>
                <i class="fas fa-play"></i> بدء التسجيل
            </button>
        </div>
        <div id="statusMsg" class="status-text hidden"></div>
    </div>
    
    <div class="canvas-area">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    // --- ثوابت وإعدادات أولية ---
    const VIDEO_BASE_URL = "https://raw.githubusercontent.com/BlidaServices/Quranative/refs/heads/main/videos/";
    const CROSSFADE_DURATION = 0.5;
    
    // قائمة بأسماء جميع الفيديوهات المتاحة
    const availableVideos = [];
    for (let i = 1; i <= 420; i++) {
        availableVideos.push(`${i}.mp4`);
        if ((i >= 186 && i <= 202) || (i >= 316 && i <= 320)) availableVideos.push(`${i}.MOV`);
    }
    const extraVideos = ["1.MP4", "2.MP4", "3.MP4", "10.MP4", "11.MP4", "12.MP4", "31.mp4", "49.MP4", "71.MP4"];
    extraVideos.forEach(v => { if(!availableVideos.includes(v)) availableVideos.push(v); });
    
    // --- القراء ---
    const reciters = [
        { id: "Yasser_Ad-Dussary_128kbps", name: "ياسر الدوسري" },
        { id: "MaherAlMuaiqly128kbps", name: "ماهر المعيقلي" },
        { id: "Abu_Bakr_Ash-Shaatree_128kbps", name: "أبوبكر الشاطري" },
        { id: "Ibrahim_Akhdar_32kbps", name: "ابراهيم الاخضر" },
        { id: "Ahmed_ibn_Ali_al-Ajamy_128kbps_ketaballah.net", name: "أحمد العجمي" },
        { id: "Ayman_Sowaid_64kbps", name: "أيمن رشدي سويد" },
        { id: "Ghamadi_40kbps", name: "سعد الغامدي" },
        { id: "Abdul_Basit_Murattal_192kbps", name: "عبدالباسط عبدالصمد مرتل" },
        { id: "Abdul_Basit_Mujawwad_128kbps", name: "عبدالباسط عبدالصمد مجود" },
        { id: "Abdurrahmaan_As-Sudais_192kbps", name: "عبدالرحمن السديس" },
        { id: "Abdullah_Basfar_192kbps", name: "عبدالله بصفر" },
        { id: "Abdullaah_3awwaad_Al-Juhaynee_128kbps", name: "عبد الله عواد الجهني" },
        { id: "Ali_Jaber_64kbps", name: "علي جابر" },
        { id: "Hudhaify_128kbps", name: "علي الحذيفي" },
        { id: "Fares_Abbad_64kbps", name: "فارس عباد" },
        { id: "khalefa_al_tunaiji_64kbps", name: "خليفة الطنيجي" },
        { id: "Husary_128kbps_Mujawwad", name: "محمود خليل الحصري مجود" },
        { id: "Husary_128kbps", name: "محمود خليل الحصري مرتل" },
        { id: "Minshawy_Mujawwad_192kbps", name: "محمد صديق المنشاوي مجود" },
        { id: "Minshawy_Murattal_128kbps", name: "محمد صديق المنشاوي مرتل" },
        { id: "Mohammad_al_Tablaway_128kbps", name: "محمد الطبلاوي" },
        { id: "Muhammad_Ayyoub_128kbps", name: "محمد أيوب" },
        { id: "Muhammad_Jibreel_128kbps", name: "محمد جبريل" },
        { id: "Alafasy_128kbps", name: "مشاري العفاسي" },
        { id: "Nasser_Alqatami_128kbps", name: "ناصر القطامي" },
        { id: "Hani_Rifai_192kbps", name: "هاني الرفاعي" }
    ];
    
    // --- العناصر ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const generateBtn = document.getElementById('generateBtn');
    const startRecordBtn = document.getElementById('startRecordBtn');
    const ratioSelect = document.getElementById('ratioSelect');
    const showSurahNameSelect = document.getElementById('showSurahNameSelect');
    const translationLang = document.getElementById('translationLang');
    const transFontSize = document.getElementById('transFontSize');
    const arabicFontSize = document.getElementById('arabicFontSize');
    const statusDiv = document.getElementById('statusMsg');
    
    function populateFontSizeSelect(selectElement, defaultValue = 70) {
        selectElement.innerHTML = '';
        for (let i = 20; i <= 100; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            if (i === defaultValue) option.selected = true;
            selectElement.appendChild(option);
        }
    }
    
    populateFontSizeSelect(arabicFontSize, 40); // الخط الافتراضي 40
    populateFontSizeSelect(transFontSize, 45);
    
    // --- المتغيرات العامة ---
    let currentAyah = { text: "", translation: "", number: 1 };
    let currentSurah = { name: "الفاتحة", number: 1, ayahs: 7 };
    let currentReciter = reciters[0].name;
    let overlayOpacity = 0.6;
    let currentRatio = "9/16";
    let isGenerating = false;
    let isRecording = false;
    let preparedData = null; // لتخزين البيانات المجهزة
    
    // متغيرات التسجيل
    let mediaRecorder = null;
    let recordedChunks = [];
    let activeAudioContext = null;
    let currentBackgroundStream = null;
    let backgroundVideoElement = null;
    let animationFrameId = null;
    
    // تأثير الانتقال بين الآيات
    let textTransition = { active: false, oldText: "", oldTrans: "", oldNum: 1, progress: 0 };
    
    function setCanvasSize() {
        if (currentRatio === "16/9") { canvas.width = 1920; canvas.height = 1080; }
        else if (currentRatio === "9/16") { canvas.width = 1080; canvas.height = 1920; }
        else { canvas.width = 1080; canvas.height = 1080; }
    }
    
    ratioSelect.onchange = () => { if (!isGenerating && !isRecording) { currentRatio = ratioSelect.value; setCanvasSize(); } };
    
    // --- تحميل البيانات ---
    function loadReciters() {
        const select = document.getElementById('reciterSelect');
        reciters.forEach(r => {
            const option = document.createElement('option');
            option.value = r.id;
            option.textContent = r.name;
            select.appendChild(option);
        });
        select.onchange = () => currentReciter = select.selectedOptions[0].textContent;
    }
    
    async function loadSurahs() {
        const res = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await res.json();
        const select = document.getElementById('surahSelect');
        
        data.data.forEach(surah => {
            const option = document.createElement('option');
            option.value = surah.number;
            option.textContent = `${surah.number}. ${surah.name}`;
            option.dataset.ayahs = surah.numberOfAyahs;
            option.dataset.name = surah.name;
            select.appendChild(option);
        });
        
        select.onchange = () => {
            const selected = select.selectedOptions[0];
            currentSurah.name = selected.dataset.name;
            currentSurah.number = parseInt(selected.value);
            currentSurah.ayahs = parseInt(selected.dataset.ayahs);
            updateAyahSelects();
            loadAyah(1);
        };
        
        updateAyahSelects();
        loadAyah(1);
    }
    
    function updateAyahSelects() {
        const startSelect = document.getElementById('startAyah');
        const endSelect = document.getElementById('endAyah');
        
        startSelect.innerHTML = '';
        for (let i = 1; i <= currentSurah.ayahs; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            startSelect.appendChild(option);
        }
        
        startSelect.onchange = () => {
            const start = parseInt(startSelect.value);
            endSelect.innerHTML = '';
            for (let i = start; i <= currentSurah.ayahs; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                endSelect.appendChild(option);
            }
            loadAyah(start);
        };
        
        startSelect.dispatchEvent(new Event('change'));
    }
    
    async function loadAyah(ayahNum) {
        try {
            const lang = translationLang.value;
            const [arabicRes, transRes] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/ayah/${currentSurah.number}:${ayahNum}`),
                lang ? fetch(`https://api.alquran.cloud/v1/ayah/${currentSurah.number}:${ayahNum}/${lang}`) : Promise.resolve(null)
            ]);
            
            const arabicData = await arabicRes.json();
            let text = arabicData.data.text;
            if (ayahNum === 1 && currentSurah.number !== 1 && currentSurah.number !== 9) {
                const words = text.split(' ');
                if (words.length > 4) text = words.slice(4).join(' ');
            }
            
            let translation = "";
            if (lang && transRes) {
                const transData = await transRes.json();
                translation = transData.data.text;
            }
            
            currentAyah = { text, translation, number: ayahNum };
        } catch (error) {
            console.error('خطأ في تحميل الآية:', error);
        }
    }
    
    // --- دوال الرسم ---
    function toArabicDigits(num) {
        return num.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
    }
    
    function wrapText(text, maxWidth, context) {
        const words = text.split(' ');
        const lines = [];
        let currentLine = '';
        
        for (let word of words) {
            const testLine = currentLine + (currentLine ? ' ' : '') + word;
            const metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && currentLine) {
                lines.push(currentLine);
                currentLine = word;
            } else {
                currentLine = testLine;
            }
        }
        lines.push(currentLine);
        return lines;
    }
    
    function drawText(text, translation, number, opacity = 1) {
        if (!text) return;
        
        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.textAlign = "center";
        ctx.shadowColor = "rgba(0, 0, 0, 0.8)";
        ctx.shadowBlur = 10;
        
        const arabicSize = parseInt(arabicFontSize.value);
        const transSize = transFontSize.disabled ? 45 : parseInt(transFontSize.value);
        const isVertical = currentRatio === "9/16";
        const maxWidth = canvas.width * (isVertical ? 0.75 : 0.85);
        const lang = translationLang.value;
        const showTranslation = lang && translation && translation.trim() !== "";
        
        const fullText = text + " ۝" + toArabicDigits(number);
        
        ctx.font = `bold ${arabicSize}px 'Amiri'`;
        ctx.fillStyle = "white";
        const arabicLines = wrapText(fullText, maxWidth, ctx);
        
        let totalHeight = arabicLines.length * arabicSize * 1.3;
        if (showTranslation) {
            totalHeight += transSize * 1.2 * wrapText(translation, maxWidth, ctx).length + 30;
        }
        
        let y = (canvas.height - totalHeight) / 2;
        if (y < canvas.height * 0.05) y = canvas.height * 0.05;
        
        arabicLines.forEach(line => {
            ctx.fillText(line, canvas.width / 2, y);
            y += arabicSize * 1.3;
        });
        
        if (showTranslation) {
            y += 30;
            ctx.font = `400 ${transSize}px 'Roboto'`;
            ctx.fillStyle = "#e0e0e0";
            const transLines = wrapText(translation, maxWidth, ctx);
            transLines.forEach(line => {
                ctx.fillText(line, canvas.width / 2, y);
                y += transSize * 1.2;
            });
        }
        
        ctx.restore();
    }
    
    function drawFooter() {
        if (showSurahNameSelect.value !== 'yes') return;
        
        ctx.save();
        const isVertical = currentRatio === "9/16";
        const fontSize = canvas.width < 1100 ? (isVertical ? 35 : 40) : 50;
        const padding = isVertical ? 70 : 50;
        const bottomDistance = isVertical ? 80 : 60;
        
        ctx.font = `400 ${fontSize}px 'Amiri Quran'`;
        ctx.fillStyle = "#c5a059";
        ctx.textAlign = "right";
        ctx.fillText(`سُورَةُ ${currentSurah.name}`, canvas.width - padding, canvas.height - bottomDistance);
        
        ctx.font = `400 ${fontSize * 0.7}px 'Tajawal'`;
        ctx.fillStyle = "rgba(253, 250, 243, 0.7)";
        ctx.textAlign = "left";
        ctx.fillText(`بصوت: ${currentReciter}`, padding, canvas.height - bottomDistance);
        
        ctx.strokeStyle = "rgba(197, 160, 89, 0.3)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, canvas.height - bottomDistance + 15);
        ctx.lineTo(canvas.width - padding, canvas.height - bottomDistance + 15);
        ctx.stroke();
        
        ctx.restore();
    }
    
    // --- إنشاء دفق فيديو عشوائي للمدة المطلوبة ---
    async function createVideoStreamForDuration(targetDuration, targetWidth, targetHeight, onProgress) {
        let videoSegments = [];
        let totalDuration = 0;
        
        const getRandomVideoUrl = () => {
            const randomName = availableVideos[Math.floor(Math.random() * availableVideos.length)];
            return VIDEO_BASE_URL + randomName;
        };
        
        while (totalDuration < targetDuration) {
            const url = getRandomVideoUrl();
            const video = document.createElement('video');
            video.src = url;
            video.crossOrigin = "Anonymous";
            video.muted = true;
            
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    let duration = video.duration;
                    if (totalDuration + duration > targetDuration + CROSSFADE_DURATION) {
                        duration = targetDuration - totalDuration + 0.1;
                    }
                    videoSegments.push({ video, duration, url });
                    totalDuration += duration;
                    resolve();
                };
                video.onerror = () => { console.warn(`فشل تحميل ${url}`); resolve(); };
                video.load();
            });
            if (onProgress) onProgress(Math.min(100, (totalDuration / targetDuration) * 100));
        }
        
        const mergeCanvas = document.createElement('canvas');
        mergeCanvas.width = targetWidth;
        mergeCanvas.height = targetHeight;
        const mergeCtx = mergeCanvas.getContext('2d');
        
        for (const seg of videoSegments) {
            seg.video.currentTime = 0;
            await seg.video.play().catch(e => console.warn);
        }
        
        let startTime = null;
        let animationId = null;
        
        const stream = mergeCanvas.captureStream(30);
        
        const processFrame = (timestamp) => {
            if (!startTime) startTime = timestamp;
            const elapsed = (timestamp - startTime) / 1000;
            
            if (elapsed >= totalDuration) {
                cancelAnimationFrame(animationId);
                for (const seg of videoSegments) {
                    seg.video.pause();
                }
                return;
            }
            
            let currentSegment = null;
            let nextSegment = null;
            let timeInCurrent = 0;
            let accumulatedTime = 0;
            
            for (let i = 0; i < videoSegments.length; i++) {
                const seg = videoSegments[i];
                const segDuration = seg.duration;
                if (elapsed >= accumulatedTime && elapsed < accumulatedTime + segDuration) {
                    currentSegment = seg;
                    timeInCurrent = elapsed - accumulatedTime;
                    if (i + 1 < videoSegments.length && (accumulatedTime + segDuration) - elapsed < CROSSFADE_DURATION) {
                        nextSegment = videoSegments[i + 1];
                    }
                    break;
                }
                accumulatedTime += segDuration;
            }
            
            if (currentSegment) {
                let fadeFactor = 1;
                let nextFadeFactor = 0;
                if (nextSegment) {
                    const fadeStart = currentSegment.duration - CROSSFADE_DURATION;
                    if (timeInCurrent > fadeStart) {
                        const fadeProgress = (timeInCurrent - fadeStart) / CROSSFADE_DURATION;
                        fadeFactor = 1 - fadeProgress;
                        nextFadeFactor = fadeProgress;
                    }
                }
                
                mergeCtx.globalAlpha = fadeFactor;
                mergeCtx.drawImage(currentSegment.video, 0, 0, targetWidth, targetHeight);
                
                if (nextSegment && nextFadeFactor > 0) {
                    mergeCtx.globalAlpha = nextFadeFactor;
                    mergeCtx.drawImage(nextSegment.video, 0, 0, targetWidth, targetHeight);
                }
                mergeCtx.globalAlpha = 1;
            }
            
            animationId = requestAnimationFrame(processFrame);
        };
        
        animationId = requestAnimationFrame(processFrame);
        
        return { stream, totalDuration, stop: () => {
            if (animationId) cancelAnimationFrame(animationId);
            for (const seg of videoSegments) {
                seg.video.pause();
                seg.video.src = "";
            }
            stream.getTracks().forEach(t => t.stop());
        }};
    }
    
    // --- رندر الإطار النهائي ---
    function startFinalRendering(backgroundStreamObj, audioElement, audioBuffers, startAyah) {
        if (currentBackgroundStream) {
            currentBackgroundStream.stop();
        }
        currentBackgroundStream = backgroundStreamObj;
        
        const video = document.createElement('video');
        video.srcObject = backgroundStreamObj.stream;
        video.muted = true;
        video.loop = false;
        video.play();
        backgroundVideoElement = video;
        
        function renderFrame() {
            if (!video.readyState || video.readyState < 2) {
                animationFrameId = requestAnimationFrame(renderFrame);
                return;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = `rgba(0, 0, 0, ${overlayOpacity})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (textTransition.active) {
                drawText(textTransition.oldText, textTransition.oldTrans, textTransition.oldNum, 1 - textTransition.progress);
                drawText(currentAyah.text, currentAyah.translation, currentAyah.number, textTransition.progress);
                textTransition.progress += 0.03;
                if (textTransition.progress >= 1) {
                    textTransition.active = false;
                }
            } else {
                drawText(currentAyah.text, currentAyah.translation, currentAyah.number, 1);
            }
            
            drawFooter();
            animationFrameId = requestAnimationFrame(renderFrame);
        }
        
        renderFrame();
        
        // مزامنة الآيات مع الصوت
        let lastAyah = startAyah - 1;
        const useFade = document.getElementById('transitionEffect').value === 'fade';
        
        const syncInterval = setInterval(async () => {
            if (audioElement.ended) {
                clearInterval(syncInterval);
                return;
            }
            
            const currentTime = audioElement.currentTime;
            let accumulatedTime = 0;
            
            for (let i = 0; i < audioBuffers.length; i++) {
                const duration = audioBuffers[i].duration;
                const adjustedDuration = i < audioBuffers.length - 1 ? duration - 0.15 : duration;
                
                if (currentTime >= accumulatedTime && currentTime < accumulatedTime + adjustedDuration) {
                    const newAyahNum = startAyah + i;
                    if (currentAyah.number !== newAyahNum) {
                        if (useFade && !textTransition.active) {
                            textTransition.oldText = currentAyah.text;
                            textTransition.oldTrans = currentAyah.translation;
                            textTransition.oldNum = currentAyah.number;
                            textTransition.active = true;
                            textTransition.progress = 0;
                        }
                        await loadAyah(newAyahNum);
                    }
                    break;
                }
                accumulatedTime += adjustedDuration;
            }
        }, 50);
        
        return syncInterval;
    }
    
    // --- دوال الصوت ---
    async function loadAudio(reciter, surah, ayah) {
        const s = surah.toString().padStart(3, '0');
        const a = ayah.toString().padStart(3, '0');
        const urls = [
            `https://www.everyayah.com/data/${reciter}/${s}${a}.mp3`,
            `https://www.everyayah.com/data/${reciter.split('_')[0]}_128kbps/${s}${a}.mp3`,
            `https://www.everyayah.com/data/${reciter.split('_')[0]}_64kbps/${s}${a}.mp3`
        ];
        for (let url of urls) {
            try {
                const response = await fetch(url);
                if (response.ok) return await response.arrayBuffer();
            } catch(e) {}
        }
        throw new Error(`فشل تحميل الآية ${ayah}`);
    }
    
    async function mergeAudios(audioBuffers, audioContext) {
        const sampleRate = audioContext.sampleRate;
        let totalDuration = 0;
        for (let i = 0; i < audioBuffers.length; i++) {
            totalDuration += audioBuffers[i].duration;
            if (i < audioBuffers.length - 1) totalDuration -= 0.15;
        }
        
        const mergedBuffer = audioContext.createBuffer(2, sampleRate * totalDuration, sampleRate);
        let offset = 0;
        for (let i = 0; i < audioBuffers.length; i++) {
            const buffer = audioBuffers[i];
            for (let ch = 0; ch < 2; ch++) {
                const sourceData = buffer.getChannelData(ch);
                const targetData = mergedBuffer.getChannelData(ch);
                const overlap = (i < audioBuffers.length - 1) ? Math.floor(audioContext.sampleRate * 0.15) : 0;
                for (let j = 0; j < sourceData.length; j++) {
                    if (i > 0 && j < overlap) {
                        const fadeIn = j / overlap;
                        const fadeOut = 1 - (j / overlap);
                        targetData[offset - overlap + j] = (targetData[offset - overlap + j] * fadeOut) + (sourceData[j] * fadeIn);
                    } else {
                        targetData[offset + j] = sourceData[j];
                    }
                }
            }
            offset += buffer.length;
            if (i < audioBuffers.length - 1) offset -= Math.floor(audioContext.sampleRate * 0.15);
        }
        return mergedBuffer;
    }
    
    function audioBufferToWav(buffer) {
        const numChannels = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const bitDepth = 16;
        let samples = buffer.getChannelData(0);
        let dataLength = samples.length * 2 * numChannels;
        let bufferLength = 44 + dataLength;
        let arrayBuffer = new ArrayBuffer(bufferLength);
        let view = new DataView(arrayBuffer);
        
        function writeString(offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
        
        writeString(0, 'RIFF');
        view.setUint32(4, bufferLength - 8, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
        view.setUint16(32, numChannels * (bitDepth / 8), true);
        view.setUint16(34, bitDepth, true);
        writeString(36, 'data');
        view.setUint32(40, dataLength, true);
        
        let offset = 44;
        for (let i = 0; i < samples.length; i++) {
            for (let ch = 0; ch < numChannels; ch++) {
                let sample = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }
        }
        return new Blob([view], { type: 'audio/wav' });
    }
    
    // --- تجهيز كل شيء قبل التسجيل ---
    async function prepareAll() {
        if (isGenerating) return;
        isGenerating = true;
        generateBtn.disabled = true;
        startRecordBtn.disabled = true;
        statusDiv.classList.remove('hidden');
        
        const start = parseInt(document.getElementById('startAyah').value);
        const end = parseInt(document.getElementById('endAyah').value);
        const reciter = document.getElementById('reciterSelect').value;
        
        try {
            statusDiv.innerText = "جاري تحميل التلاوة...";
            const audioContext = new AudioContext();
            const audioBuffers = [];
            
            for (let i = start; i <= end; i++) {
                const audioData = await loadAudio(reciter, currentSurah.number, i);
                const buffer = await audioContext.decodeAudioData(audioData);
                audioBuffers.push(buffer);
            }
            
            const totalAudioDuration = audioBuffers.reduce((sum, buf) => sum + buf.duration, 0);
            
            statusDiv.innerText = "جاري تحضير فيديوهات الخلفية العشوائية...";
            const videoStreamObj = await createVideoStreamForDuration(totalAudioDuration, canvas.width, canvas.height, (p) => {
                statusDiv.innerText = `تجهيز الفيديو: ${Math.floor(p)}%`;
            });
            
            const mergedBuffer = await mergeAudios(audioBuffers, audioContext);
            const wavBlob = audioBufferToWav(mergedBuffer);
            const audioUrl = URL.createObjectURL(wavBlob);
            const audio = new Audio(audioUrl);
            
            // تخزين البيانات المجهزة
            preparedData = {
                audioContext,
                audioBuffers,
                audio,
                audioUrl,
                videoStreamObj,
                startAyah: start
            };
            
            statusDiv.innerText = "تم التجهيز بنجاح! اضغط بدء التسجيل";
            startRecordBtn.disabled = false;
            
        } catch (error) {
            console.error('خطأ:', error);
            alert('حدث خطأ أثناء التجهيز: ' + error.message);
            generateBtn.disabled = false;
            statusDiv.classList.add('hidden');
        } finally {
            isGenerating = false;
        }
    }
    
    // --- بدء التسجيل والعرض ---
    async function startRecording() {
        if (!preparedData || isRecording) return;
        isRecording = true;
        startRecordBtn.disabled = true;
        generateBtn.disabled = true;
        statusDiv.innerText = "جاري التسجيل والعرض...";
        
        const { audioContext, audioBuffers, audio, audioUrl, videoStreamObj, startAyah } = preparedData;
        
        activeAudioContext = audioContext;
        
        // بدء العرض
        const syncInterval = startFinalRendering(videoStreamObj, audio, audioBuffers, startAyah);
        
        // بدء التسجيل
        const stream = canvas.captureStream(30);
        const audioDest = audioContext.createMediaStreamDestination();
        const source = audioContext.createMediaElementSource(audio);
        source.connect(audioDest);
        source.connect(audioContext.destination);
        
        const combinedStream = new MediaStream([...stream.getVideoTracks(), ...audioDest.stream.getAudioTracks()]);
        mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
        recordedChunks = [];
        
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const finalBlob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(finalBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Quran_Video_${Date.now()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            
            // تنظيف
            if (activeAudioContext) activeAudioContext.close();
            if (currentBackgroundStream) {
                currentBackgroundStream.stop();
                currentBackgroundStream = null;
            }
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            URL.revokeObjectURL(audioUrl);
            
            statusDiv.innerText = "تم الانتهاء! يمكنك تجهيز فيديو جديد";
            generateBtn.disabled = false;
            startRecordBtn.disabled = true;
            isRecording = false;
            preparedData = null;
        };
        
        mediaRecorder.start();
        audio.play();
        
        // مراقبة نهاية الصوت
        audio.onended = () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        };
    }
    
    // --- الأحداث ---
    document.getElementById('opacitySlider').oninput = (e) => {
        overlayOpacity = e.target.value / 100;
        document.getElementById('opacityValue').textContent = e.target.value;
    };
    
    translationLang.onchange = () => {
        transFontSize.disabled = (translationLang.value === "");
        loadAyah(currentAyah.number);
    };
    
    generateBtn.onclick = prepareAll;
    startRecordBtn.onclick = startRecording;
    
    // بدء التشغيل
    setCanvasSize();
    loadReciters();
    loadSurahs();
    transFontSize.disabled = true;
</script>
